<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ANA Receptionist</title>
    <link rel="stylesheet" href="/static/styles.css?v=2" />
  </head>
  <body>
    <main class="shell">
      <section class="conversation" aria-label="Conversation">
        <header class="topbar">
          <div>
            <p class="eyebrow">ANA</p>
            <h1>AI Receptionist</h1>
          </div>
          <div class="health" id="healthBadge">
            <span class="dot"></span>
            <span id="healthText">Checking</span>
          </div>
        </header>

        <div class="stage" id="stage">
          <div class="orb" id="orb">
            <div class="ring ring-a"></div>
            <div class="ring ring-b"></div>
            <div class="core">
              <span id="orbLabel">Ready</span>
            </div>
          </div>
          <div class="caption" id="caption">Good to see you. How can I help?</div>
          <div class="statusline" id="statusLine">Ready</div>
        </div>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <input id="textInput" type="text" autocomplete="off" placeholder="Type a question" />
          <button class="send-button" type="submit">Send</button>
        </form>
      </section>

      <aside class="voice-panel" aria-label="Voice controls">
        <button class="mic-button" id="micButton" type="button" aria-pressed="false">
          <span class="mic-glyph"></span>
          <span id="micText">Start voice</span>
        </button>
        <div class="meter" aria-hidden="true">
          <span id="meterBar"></span>
        </div>
        <div class="mini-log" id="miniLog">
          <p>Voice is idle.</p>
        </div>
      </aside>
    </main>

    <script src="/static/app.js?v=2"></script>
  </body>
</html>
